{% extends 'assistant/base.html' %}

{% block title %}Keluar — BRAP{% endblock %}

{% block content %}
<style>
  .confirm-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .confirm-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    max-width: 420px;
    width: 100%;
    padding: 2.5rem;
    text-align: center;
  }

  .confirm-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(229, 62, 62, 0.08);
    border-radius: 50%;
    color: #e53e3e;
  }

  .confirm-icon svg {
    width: 26px;
    height: 26px;
  }

  .confirm-card h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 0.75rem;
    color: #1a1a1a;
  }

  .confirm-card p {
    color: #666;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 2rem;
  }

  .confirm-card form {
    margin: 0;
  }

  .confirm-submit-btn {
    width: 100%;
    padding: 12px;
    background: #e53e3e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }

  .confirm-submit-btn:hover {
    background: #c53030;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(229, 62, 62, 0.3);
  }

  .confirm-cancel-link {
    display: block;
    margin-top: 1.25rem;
    font-size: 14px;
    color: #999;
    text-decoration: none;
  }

  .confirm-cancel-link:hover {
    color: #666;
    text-decoration: underline;
  }
</style>

<div class="confirm-container">
  <div class="confirm-card">
    <div class="confirm-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </div>

    <h1>Keluar dari BRAP?</h1>
    <p>Kamu akan keluar dari akunmu saat ini. Kamu bisa login kembali kapan saja.</p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      {% if redirect_field_value %}
      <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
      {% endif %}
      <button type="submit" class="confirm-submit-btn">Ya, Keluar</button>
    </form>

    <a href="{% url 'home' %}" class="confirm-cancel-link">Batal</a>
  </div>
</div>
{% endblock %}
